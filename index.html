<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Oracle - Fortune Teller</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

  <main class="card-container">
    <header class="oracle-header">
      <div class="crystal-icon">🔮</div>
      <h1>The Oracle</h1>
      <p class="subtitle">Discover what destiny has in store for you today</p>
    </header>

    <section class="fortune-display">
      <p id="fortune-text" class="placeholder">Come closer and reveal your tomorrow....</p>
    </section>

    <button id="fortune-btn" class="interactive-btn">See my destiny</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
